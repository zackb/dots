# settings: key = value
border_width     = 2
border_active    = 0x33ccffff   # RGBA hex
border_inactive  = 0x444444ff
gaps             = 4
rounding         = 7           # corner radius in px
opacity          = 0.95         # 0.0..1.0
scale            = 2.0

# ENV
env = QT_QPA_PLATFORM,wayland
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME, BreezeX-RosePine-Linux
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# keybinds: bind = MODS, KEY, action[, arg]
#   MODS: SUPER SHIFT CTRL ALT (space-separated)
#   actions: exec, killactive, exit, focusnext, focusprev, togglelayout
bind = SUPER, R, exec, ghostty
bind = SUPER,       Q,      killactive
bind = SUPER SHIFT, E,      exit
bind = SUPER,       H,      focusleft
bind = SUPER,       L,      focusright
bind = SUPER,       K,      focusup
bind = SUPER,       J,      focusdown
bind = SUPER,       F,      fullscreen
bind = SUPER,       V,      togglefloating
# bind = SUPER,       Space,  togglelayout

# Fenriz quickshell
bind = SUPER, Space,        exec, qs ipc call launcher toggle
bind = SUPER SHIFT, L,      exec, qs ipc call lock lock
bind = SUPER, Tab,          exec, hyprwat --overview
bind = SUPER, W,            exec, hyprwat ~/bin/wallpaper.sh

# Workspaces
bind = SUPER,       1, workspace, 1
bind = SUPER,       2, workspace, 2
bind = SUPER,       3, workspace, 3
bind = SUPER,       4, workspace, 4
bind = SUPER,       5, workspace, 5
bind = SUPER,       6, workspace, 6
bind = SUPER,       7, workspace, 7
bind = SUPER,       8, workspace, 8
bind = SUPER,       9, workspace, 9
bind = SUPER,       0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Exec
exec-once = quickshell
